spring.config.import=optional:file:./application-local.properties

# Server encoding UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Jackson UTF-8
spring.jackson.charset=UTF-8
spring.jackson.default-property-inclusion=non_null

# Configuración de la base de datos
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# Configuración de JPA
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=false

# Datos demo: activar con SPRING_PROFILES_ACTIVE=demo
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8

# URL del frontend para links en correos
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Configuración del servidor
server.servlet.context-path=/API/Tutorias

# Configuración de CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Configuración del email
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.default-encoding=UTF-8
# Timeouts SMTP: evitan que un envío lento de Gmail cuelgue el request (free tier)
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Configuración de JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
